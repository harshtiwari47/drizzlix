  <div id="root"></div>
  <script>
    (function cleanupServiceWorker() {
      if (!('serviceWorker' in navigator)) return;

      var reloadKey = 'drizzlix.sw-reset.v1';

      navigator.serviceWorker
        .getRegistrations()
        .then(function (registrations) {
          return Promise.all(
            registrations.map(function (registration) {
              return registration.unregister().catch(function () {
                return false;
              });
            }),
          );
        })
        .then(function () {
          if (!('caches' in window)) return;
          return caches.keys().then(function (keys) {
            var appKeys = keys.filter(function (key) {
              return key.indexOf('neurodeck-shell-v') === 0;
            });
            return Promise.all(
              appKeys.map(function (key) {
                return caches.delete(key);
              }),
            );
          });
        })
        .then(function () {
          var hasController = Boolean(navigator.serviceWorker.controller);
          var hasReloaded = window.sessionStorage.getItem(reloadKey) === '1';

          if (hasController && !hasReloaded) {
            window.sessionStorage.setItem(reloadKey, '1');
            window.location.reload();
            return;
          }

          if (!hasController && hasReloaded) {
            window.sessionStorage.removeItem(reloadKey);
          }
        })
        .catch(function () {
          // Keep page startup resilient even when cleanup fails.
        });
    })();
  </script>
